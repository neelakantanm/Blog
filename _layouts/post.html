---
layout: default
---

<article class="post-article">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  {% if page.comments != false %}
    {% include comments.html %}
  {% endif %}
</article>
